services:
  nope-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: NOPE
    environment:
      API_URL_INTERNAL: http://nope-api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      nope-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.75
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nope-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nope-api
    environment:
      NOPE_ENVIRONMENT: development
      NOPE_WEB_URL: http://localhost:3000
      NOPE_DATABASE_URL: postgresql+psycopg://nope:nope@nope-postgres:5432/nope
      NOPE_AUTH_DATABASE_URL: postgresql://nope:nope@nope-postgres:5432/nope
      NOPE_TEMP_ROOT: /app/.nope-workspaces
      TRIVY_CACHE_DIR: /app/.nope-workspaces/trivy-cache
      NOPE_REDIS_URL: redis://nope-redis:6379/0
      NOPE_MINIO_ENDPOINT: http://nope-minio:9000
      NOPE_SANDBOX_WORKSPACE_VOLUME: nope_nope-workspaces
      NOPE_SANDBOX_RUNNER_URL: http://nope-runner:8010
      NOPE_SANDBOX_RUNNER_TOKEN: ${NOPE_SANDBOX_RUNNER_TOKEN:-development-runner-token-change-me}
      NOPE_AI_PROVIDER: llama.cpp
      NOPE_AI_RUNTIME_URL: http://nope-ai:8080
      NOPE_QWEN_ENDPOINT: http://nope-ai:8080
      NOPE_AI_MODEL_NAME: qwen3-8b-q4-k-m
      NOPE_AI_MODEL_PATH: /models/${NOPE_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      NOPE_QWEN_MODEL_FILE: ${NOPE_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      NOPE_QWEN_CONTEXT_SIZE: ${NOPE_QWEN_CONTEXT_SIZE:-4096}
      NOPE_QWEN_BATCH_SIZE: ${NOPE_QWEN_BATCH_SIZE:-256}
      NOPE_QWEN_THREADS: ${NOPE_QWEN_THREADS:-8}
      NOPE_QWEN_PARALLEL: ${NOPE_QWEN_PARALLEL:-1}
      NOPE_AI_GPU_LAYERS: ${NOPE_QWEN_GPU_LAYERS:-28}
      NOPE_QWEN_GPU_LAYERS: ${NOPE_QWEN_GPU_LAYERS:-28}
      NOPE_QWEN_MAX_OUTPUT_TOKENS: ${NOPE_QWEN_MAX_OUTPUT_TOKENS:-1024}
      NOPE_QWEN_TIMEOUT_SECONDS: ${NOPE_QWEN_TIMEOUT_SECONDS:-180}
      NOPE_AI_GPU_MEMORY_TARGET_MB: ${NOPE_QWEN_GPU_MEMORY_TARGET_MB:-5000}
      NOPE_QWEN_GPU_MEMORY_TARGET_MB: ${NOPE_QWEN_GPU_MEMORY_TARGET_MB:-5000}
    ports:
      - "8000:8000"
    volumes:
      - nope-workspaces:/app/.nope-workspaces
    depends_on:
      nope-postgres:
        condition: service_healthy
      nope-redis:
        condition: service_healthy
      nope-minio:
        condition: service_healthy
      nope-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1024m
    pids_limit: 256
    mem_limit: 1536m
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nope-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nope-worker
    restart: unless-stopped
    command: ["python", "apps/worker/worker.py"]
    environment:
      NOPE_ENVIRONMENT: development
      NOPE_DATABASE_URL: postgresql+psycopg://nope:nope@nope-postgres:5432/nope
      NOPE_AUTH_DATABASE_URL: postgresql://nope:nope@nope-postgres:5432/nope
      NOPE_REDIS_URL: redis://nope-redis:6379/0
      NOPE_MINIO_ENDPOINT: http://nope-minio:9000
      NOPE_TEMP_ROOT: /app/.nope-workspaces
      TRIVY_CACHE_DIR: /app/.nope-workspaces/trivy-cache
      NOPE_SANDBOX_WORKSPACE_VOLUME: nope_nope-workspaces
      NOPE_SANDBOX_RUNNER_URL: http://nope-runner:8010
      NOPE_SANDBOX_RUNNER_TOKEN: ${NOPE_SANDBOX_RUNNER_TOKEN:-development-runner-token-change-me}
      NOPE_AI_PROVIDER: llama.cpp
      NOPE_AI_RUNTIME_URL: http://nope-ai:8080
      NOPE_QWEN_ENDPOINT: http://nope-ai:8080
      NOPE_QWEN_MODEL_FILE: ${NOPE_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}
      NOPE_QWEN_CONTEXT_SIZE: ${NOPE_QWEN_CONTEXT_SIZE:-4096}
      NOPE_QWEN_BATCH_SIZE: ${NOPE_QWEN_BATCH_SIZE:-256}
      NOPE_QWEN_THREADS: ${NOPE_QWEN_THREADS:-8}
      NOPE_QWEN_PARALLEL: ${NOPE_QWEN_PARALLEL:-1}
      NOPE_AI_GPU_LAYERS: ${NOPE_QWEN_GPU_LAYERS:-28}
      NOPE_QWEN_GPU_LAYERS: ${NOPE_QWEN_GPU_LAYERS:-28}
      NOPE_QWEN_MAX_OUTPUT_TOKENS: ${NOPE_QWEN_MAX_OUTPUT_TOKENS:-1024}
      NOPE_QWEN_TIMEOUT_SECONDS: ${NOPE_QWEN_TIMEOUT_SECONDS:-180}
      NOPE_AI_GPU_MEMORY_TARGET_MB: ${NOPE_QWEN_GPU_MEMORY_TARGET_MB:-5000}
      NOPE_QWEN_GPU_MEMORY_TARGET_MB: ${NOPE_QWEN_GPU_MEMORY_TARGET_MB:-5000}
    volumes:
      - nope-workspaces:/app/.nope-workspaces
    depends_on:
      nope-postgres:
        condition: service_healthy
      nope-redis:
        condition: service_healthy
      nope-minio:
        condition: service_healthy
      nope-ai:
        condition: service_healthy
      nope-runner:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1024m
    pids_limit: 512
    mem_limit: 3072m
    cpus: 3.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nope-runner:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nope-runner
    restart: unless-stopped
    user: root
    command: ["uvicorn", "nope_api.runner:app", "--host", "0.0.0.0", "--port", "8010", "--app-dir", "apps/api"]
    environment:
      NOPE_ENVIRONMENT: development
      NOPE_TEMP_ROOT: /app/.nope-workspaces
      NOPE_SANDBOX_WORKSPACE_VOLUME: nope_nope-workspaces
      NOPE_SANDBOX_RUNNER_TOKEN: ${NOPE_SANDBOX_RUNNER_TOKEN:-development-runner-token-change-me}
      NOPE_SANDBOX_DOCKER_COMMAND: docker
    volumes:
      - nope-workspaces:/app/.nope-workspaces:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
    pids_limit: 256
    mem_limit: 1024m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nope-postgres:
    image: postgres:16-alpine
    container_name: nope-postgres
    environment:
      POSTGRES_DB: nope
      POSTGRES_USER: nope
      POSTGRES_PASSWORD: nope
    volumes:
      - nope-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nope -d nope"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 256
    mem_limit: 1024m
    cpus: 1.0

  nope-redis:
    image: redis:7-alpine
    container_name: nope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5

  nope-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nope-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: nope
      MINIO_ROOT_PASSWORD: nope-development-password
    volumes:
      - nope-minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    pids_limit: 256
    mem_limit: 1024m
    cpus: 1.0

  nope-ai:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: nope-ai
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/${NOPE_MODEL_FILE:-Qwen3-8B-Q4_K_M.gguf}"
      - "--ctx-size"
      - "${NOPE_QWEN_CONTEXT_SIZE:-4096}"
      - "--batch-size"
      - "${NOPE_QWEN_BATCH_SIZE:-256}"
      - "--n-gpu-layers"
      - "${NOPE_QWEN_GPU_LAYERS:-28}"
      - "--threads"
      - "${NOPE_QWEN_THREADS:-8}"
      - "--parallel"
      - "${NOPE_QWEN_PARALLEL:-1}"
    volumes:
      - type: bind
        source: ${NOPE_MODEL_HOST_DIR:-D:/Desktop/Model}
        target: /models
        read_only: true
    ports:
      - "127.0.0.1:8081:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    pids_limit: 512
    mem_limit: 8192m
    cpus: 4.0

volumes:
  nope-postgres:
  nope-minio:
  nope-workspaces:
