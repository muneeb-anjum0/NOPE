services:
  nope-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: NOPE
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      nope-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  nope-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nope-api
    environment:
      NOPE_ENVIRONMENT: development
      NOPE_WEB_URL: http://localhost:3000
      NOPE_DATABASE_URL: postgresql+psycopg://nope:nope@nope-postgres:5432/nope
      NOPE_REDIS_URL: redis://nope-redis:6379/0
      NOPE_MINIO_ENDPOINT: http://nope-minio:9000
      NOPE_AI_PROVIDER: none
      NOPE_AI_RUNTIME_URL: http://nope-ai:8080
      NOPE_AI_MODEL_NAME: qwen3-8b-q4-k-m
      NOPE_AI_MODEL_PATH: /models/qwen3-8b-q4_k_m.gguf
    ports:
      - "8000:8000"
    volumes:
      - nope-workspaces:/app/.nope-workspaces
    depends_on:
      nope-postgres:
        condition: service_healthy
      nope-redis:
        condition: service_healthy
      nope-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nope-worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nope-worker
    command: ["python", "apps/worker/worker.py"]
    environment:
      NOPE_REDIS_URL: redis://nope-redis:6379/0
    depends_on:
      nope-redis:
        condition: service_healthy

  nope-postgres:
    image: postgres:16-alpine
    container_name: nope-postgres
    environment:
      POSTGRES_DB: nope
      POSTGRES_USER: nope
      POSTGRES_PASSWORD: nope
    volumes:
      - nope-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nope -d nope"]
      interval: 10s
      timeout: 5s
      retries: 5

  nope-redis:
    image: redis:7-alpine
    container_name: nope-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nope-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: nope-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: nope
      MINIO_ROOT_PASSWORD: nope-development-password
    volumes:
      - nope-minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  nope-ai:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: nope-ai
    profiles:
      - ai-cpu
      - ai-gpu
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--model"
      - "/models/${NOPE_QWEN_MODEL_FILE:-qwen3-8b-q4_k_m.gguf}"
      - "--ctx-size"
      - "${NOPE_AI_CONTEXT_LENGTH:-8192}"
      - "--n-gpu-layers"
      - "${NOPE_AI_GPU_LAYERS:-0}"
      - "--parallel"
      - "1"
    volumes:
      - type: bind
        source: ${NOPE_MODEL_DIR:-./models}
        target: /models
        read_only: true
    ports:
      - "127.0.0.1:8081:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  nope-postgres:
  nope-minio:
  nope-workspaces:
