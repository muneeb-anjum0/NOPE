services:
  nope-api:
    environment:
      NOPE_AI_PROVIDER: llama.cpp
      NOPE_AI_RUNTIME_URL: http://nope-ai:8080
      NOPE_AI_GPU_LAYERS: "${NOPE_AI_GPU_LAYERS:-28}"
    depends_on:
      nope-ai:
        condition: service_healthy

  nope-ai:
    profiles:
      - ai-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
